{% extends "bookings/base.html" %}
{% load static %}

{% block css %}
    <!-- Подключение файла стилей -->
    <link rel="stylesheet" href="{% static 'css/register_style.css' %}">
{% endblock %}

{% block content %}
    <!-- Основной контент с формой -->
    <main class="auth-section">
        <div class="form-container">
            <h2>Вход</h2>
            <p class="form-subtitle">Войдите в аккаунт, чтобы получить доступ ко всем возможностям</p>

            <form action="#" method="POST">
                <div class="form-group">
                    <label for="username">Имя пользователя</label>
                    <input type="text" id="username" name="username" placeholder="Ваше имя" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль</label>
                    <input type="password" id="password" name="password" placeholder="Мин. 8 символов" minlength="8" required>
                </div>

                <button type="submit" class="btn-submit">Войти</button>
            </form>

            <div class="form-footer">
                Нет аккаунта? <a href="{% url 'register' %}">Зарегистрироваться</a>
            </div>
        </div>
    </main>
{% endblock %}
